name: Build DMG

on:
  # Build on tagged releases
  push:
    tags:
      - "v*"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        # FluidAudio >= 0.9.0 ships a swift-tools-version:6.0 manifest,
        # so we need an Xcode that bundles Swift 6 (Xcode 16+).
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve Swift dependencies
        run: swift package resolve

      - name: Build and package DMG
        run: ./scripts/build-dmg.sh

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RelayRunner-dmg
          path: dist/RelayRunner.dmg
          if-no-files-found: error

      - name: Upload DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RelayRunner.dmg
