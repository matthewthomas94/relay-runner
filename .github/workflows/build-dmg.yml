name: Build DMG

on:
  # Build on tagged releases + every push to main so regressions surface early
  push:
    branches: [main]
    tags:
      - "v*"
  # Validate the DMG build on PRs that touch the app or its packaging
  pull_request:
    paths:
      - "Sources/**"
      - "Package.swift"
      - "Package.resolved"
      - "Info.plist"
      - "assets/**"
      - "scripts/**"
      - ".github/workflows/build-dmg.yml"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift dependencies
        run: swift package resolve

      - name: Build and package DMG
        run: ./scripts/build-dmg.sh

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RelayRunner-dmg
          path: dist/RelayRunner.dmg
          if-no-files-found: error

      - name: Upload DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RelayRunner.dmg
